<!DOCTYPE html>
<html>

<head>
  <!-- ===== PAGE TITLE (TAB NAME) ===== -->
  <title>Eshaana Works</title>

  <!-- ===== GOOGLE FONT: TYPEWRITER STYLE ===== -->
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <style>
    /* ===== GENERAL PAGE STYLING ===== */
    body {
      margin: 0;
      font-family: 'Special Elite', monospace; /* Typewriter font */
      background: #0d1117; /* Dark background */
      color: #c9d1d9; /* Light text */
      scroll-behavior: smooth; /* Smooth scrolling */
    }

    /* ===== HERO SECTION (FULL SCREEN INTRO) ===== */
    header {
      height: 100vh; /* Full screen height */
      display: flex;
      flex-direction: column;
      justify-content: center; /* Center vertically */
      padding-left: 10%;
      background: linear-gradient(135deg, #0d1117, #161b22);
    }

    /* ===== MAIN TITLE ===== */
    h1 {
      font-size: 50px;
      color: #58a6ff;
      margin: 0;
    }

    /* ===== BLINKING CURSOR EFFECT ===== */
    #typing::after {
      content: "|";
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* ===== SECTION STYLING ===== */
    section {
      padding: 80px 10%;

      /* Animation starting state (hidden) */
      opacity: 0;
      transform: translateY(40px);

      transition: all 0.8s ease;
    }

    /* When section becomes visible */
    section.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== CONTENT CARDS ===== */
    .card {
      background: #161b22;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
    }

    /* ===== NAVIGATION MENU ===== */
    nav {
      position: fixed;
      top: 20px;
      right: 40px;
    }

    nav a {
      color: #58a6ff;
      margin-left: 20px;
      text-decoration: none;
      font-size: 14px;
    }

    nav a:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

<!-- ===== NAVIGATION BAR ===== -->
<nav>
  <!-- These scroll to sections -->
  <a href="#projects">Projects</a>
  <a href="#research">Research</a>
  <a href="#papers">Papers</a>
</nav>

<!-- ===== HERO SECTION ===== -->
<header>
  <!-- This text will be typed automatically -->
  <h1 id="typing"></h1>

  <!-- Subtitle -->
  <p>Engineering Portfolio</p>
</header>

<!-- ===== PROJECTS SECTION ===== -->
<section id="projects">
  <h2>Projects</h2>

  <div class="card">
    <!-- Replace with your real projects -->
    Example Project: Add description, tech stack, and images here.
  </div>

</section>

<!-- ===== RESEARCH SECTION ===== -->
<section id="research">
  <h2>Research</h2>

  <div class="card">
    Write about your research work here.
  </div>

</section>

<!-- ===== PAPERS SECTION ===== -->
<section id="papers">
  <h2>Papers</h2>

  <div class="card">
    <!-- Example PDF link -->
    <a href="papers/sample.pdf">Read my paper</a>
  </div>

</section>

<!-- ===== JAVASCRIPT SECTION ===== -->
<script>

  /* ===== TYPEWRITER EFFECT ===== */

  const text = "Eshaan Works"; // CHANGE THIS TEXT
  let index = 0;

  function typeEffect() {
    if (index < text.length) {
      document.getElementById("typing").innerHTML += text.charAt(index);
      index++;

      // Typing speed (lower = faster)
      setTimeout(typeEffect, 100);
    }
  }

  // Start typing when page loads
  window.onload = typeEffect;


  /* ===== SCROLL ANIMATION ===== */

  const sections = document.querySelectorAll("section");

  window.addEventListener("scroll", () => {
    sections.forEach(sec => {

      const top = sec.getBoundingClientRect().top;

      // When section enters screen → animate
      if (top < window.innerHeight - 100) {
        sec.classList.add("show");
      }

    });
  });

</script>

</body>
</html>
